<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | iQPeak Intelligence Hub 2026</title>
    <meta name="description" content="Get in touch with the iQPeak team. For media inquiries, analysis requests, or technical support regarding our global drama database.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #050505; --surface: #111; --text: #eee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; padding: 40px 5%; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        nav { margin-bottom: 60px; }
        .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: white; }
        .logo span { color: var(--accent); }
        
        h1 { font-size: clamp(2.5rem, 6vw, 4rem); color: white; letter-spacing: -3px; line-height: 1; margin-bottom: 20px; }
        p { color: #ccc; font-size: 1.2rem; margin-bottom: 40px; }

        .contact-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .info-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid #222; }
        .info-card h3 { color: var(--accent); margin-top: 0; font-size: 1.5rem; }
        
        .contact-form { display: flex; flex-direction: column; gap: 20px; }
        input, textarea { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; font-family: inherit; font-size: 1rem; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        .submit-btn { background: var(--accent); color: black; padding: 15px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .submit-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .social-links { margin-top: 30px; display: flex; gap: 20px; }
        .social-links a { color: #666; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .social-links a:hover { color: var(--accent); }

        footer { margin-top: 100px; text-align: center; padding-top: 40px; border-top: 1px solid #111; font-size: 0.9rem; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <nav><a href="index.html" class="logo">iQ<span>PEAK</span></a></nav>

        <h1>Connect with iQPeak</h1>
        <p>Have a question about our media analysis or want to report a technical issue? Our intelligence team is ready to assist you.</p>

        <div class="contact-grid">
            <div class="info-card">
                <form class="contact-form">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email Address" required>
                    <textarea rows="5" placeholder="How can we help you?" required></textarea>
                    <button type="submit" class="submit-btn">Transmit Message</button>
                </form>
                
                <div class="social-links">
                    <a href="https://github.com/mateusworkspace" target="_blank">GitHub</a>
                    <a href="#">LinkedIn</a>
                    <a href="#">Twitter/X</a>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 iQPeak.xyz | Analysis by Mateus Silva dos Santos | <a href="privacy.html" style="color:#444">Privacy</a>
        </footer>
    </div>
</body>
</html>
